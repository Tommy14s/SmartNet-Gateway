<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Rebooting...</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; text-align: center; padding-top: 100px; }
        h1 { color: #f59e0b; }
        .loader { border: 5px solid #334155; border-top: 5px solid #f59e0b; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        a { color: #38bdf8; text-decoration: none; padding: 10px 20px; border: 1px solid #38bdf8; border-radius: 6px; display: inline-block; margin-top: 20px; font-weight: bold;}
        a:hover { background: #38bdf8; color: #0f172a; }
    </style>
</head>
<body>
    <div class="loader"></div>
    <h1>🔄 กำลังสั่ง Reboot Router...</h1>
    <p style="color: #94a3b8; font-size: 16px;">ระบบเครือข่ายจะถูกตัดชั่วคราว กรุณารอประมาณ 1-2 นาทีให้เครื่องบูตเสร็จ</p>
    <a href="/">คลิกที่นี่เพื่อกลับสู่หน้าแรก (Dashboard)</a>
</body>
</html>
